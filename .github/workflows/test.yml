name: Test

on:
  push:
    branches:
      - main
    paths:
      - '.java-version'
      - '**/*.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'src/**'
  pull_request:
    paths:
      - '.java-version'
      - '**/*.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6.2.0

      - name: Set up JDK
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test --no-daemon --stacktrace
